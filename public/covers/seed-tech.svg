<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="0.6" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" fill="url(#bg)"/>
  <!-- sun -->
  <g transform="translate(400 120)">
    <circle r="44" fill="#fde68a" opacity="0.95"/>
    <g stroke="#fde68a" stroke-width="6" opacity="0.8">
      <line x1="0" y1="-66" x2="0" y2="-86"/>
      <line x1="0" y1="66" x2="0" y2="86"/>
      <line x1="-66" y1="0" x2="-86" y2="0"/>
      <line x1="66" y1="0" x2="86" y2="0"/>
      <line x1="-48" y1="-48" x2="-62" y2="-62"/>
      <line x1="48" y1="-48" x2="62" y2="-62"/>
      <line x1="-48" y1="48" x2="-62" y2="62"/>
      <line x1="48" y1="48" x2="62" y2="62"/>
    </g>
  </g>
  <!-- solar panel -->
  <g transform="translate(400 250)">
    <polygon points="-150,40 150,40 110,-20 -110,-20" fill="#c7d2fe" opacity="0.9"/>
    <g stroke="#4338ca" stroke-width="3" opacity="0.7">
      <line x1="-110" y1="10" x2="110" y2="10"/>
      <line x1="-50" y1="-20" x2="-90" y2="40"/>
      <line x1="10" y1="-20" x2="-10" y2="40"/>
      <line x1="70" y1="-20" x2="70" y2="40"/>
    </g>
  </g>
</svg>
