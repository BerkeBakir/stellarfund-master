<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#312e81"/>
      <stop offset="0.6" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" fill="url(#bg)"/>
  <circle cx="650" cy="90" r="40" fill="#fde68a" opacity="0.85"/>
  <!-- graduation cap -->
  <g transform="translate(360 150)" fill="#ffffff">
    <polygon points="0,-40 120,-4 0,32 -120,-4" opacity="0.95"/>
    <rect x="-40" y="0" width="80" height="40" fill="#c7d2fe" opacity="0.9"/>
    <line x1="120" y1="-4" x2="120" y2="60" stroke="#fde68a" stroke-width="4"/>
    <circle cx="120" cy="64" r="7" fill="#fde68a"/>
  </g>
  <!-- book lines -->
  <g stroke="#a5b4fc" stroke-width="6" opacity="0.5">
    <line x1="120" y1="250" x2="300" y2="250"/>
    <line x1="120" y1="272" x2="260" y2="272"/>
    <line x1="500" y1="250" x2="680" y2="250"/>
    <line x1="540" y1="272" x2="680" y2="272"/>
  </g>
</svg>
