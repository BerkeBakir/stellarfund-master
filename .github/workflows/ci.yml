name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - name: Build campaign wasm (factory imports it at compile time)
        run: cd contracts/campaign && cargo build --release --target wasm32v1-none
      - name: Test contracts
        run: |
          for c in reputation campaign factory; do
            ( cd contracts/$c && cargo test --lib )
          done

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm test
      - run: npm run build
